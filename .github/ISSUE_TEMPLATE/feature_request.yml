name: Feature request
description: Propose a new hook, utility, or API improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: proposal
    attributes:
      label: Proposal summary
      placeholder: Add useSomething(...)
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: Suggested API
      placeholder: |
        const value = useSomething(options)
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
