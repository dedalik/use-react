name: Release to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (without v prefix), e.g. 1.2.3"
        required: true
        type: string

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish version
        id: tag_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "Version input is required."
              exit 1
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
            if [ -z "$TAG_NAME" ] || [ "$VERSION" = "$TAG_NAME" ]; then
              echo "Tag must start with 'v' (example: v1.2.3)."
              exit 1
            fi
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with tag / input
        run: npm version "${{ steps.tag_version.outputs.version }}" --no-git-tag-version

      - name: Verify quality gates
        run: npm run test && npm run lint && npm run build

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
