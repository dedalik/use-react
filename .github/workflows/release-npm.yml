# Publishes @dedalik/use-react to npm. Requires repository secret NPM_TOKEN on
# THIS repo (github.com/dedalik/use-react), not use-react-docs. See CONTRIBUTING.md.

name: Release to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (without v prefix), e.g. 1.2.3"
        required: true
        type: string

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
          always-auth: "false"

      - name: Verify npm token for publish
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty."
            echo "Add it under GitHub → Settings → Secrets and variables → Actions."
            echo "Create an npm token: https://www.npmjs.com/settings/~/tokens (Automation, or Granular with Publish for @dedalik/use-react)."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: npm ci

      - name: Resolve publish version
        id: tag_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "Version input is required."
              exit 1
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
            if [ -z "$TAG_NAME" ] || [ "$VERSION" = "$TAG_NAME" ]; then
              echo "Tag must start with 'v' (example: v1.2.3)."
              exit 1
            fi
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with tag / input
        run: npm version "${{ steps.tag_version.outputs.version }}" --no-git-tag-version

      - name: Verify quality gates
        run: npm run format:check && npm run test && npm run lint && npm run build

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
