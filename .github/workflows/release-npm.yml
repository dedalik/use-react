name: Release to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Read version from GitHub release tag
        id: tag_version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"

          if [ -z "$TAG_NAME" ] || [ "$VERSION" = "$TAG_NAME" ]; then
            echo "Tag must start with 'v' (example: v1.2.3)."
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: $TAG_NAME"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with release tag
        run: npm version "${{ steps.tag_version.outputs.version }}" --no-git-tag-version

      - name: Verify quality gates
        run: npm run test && npm run lint && npm run build

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
